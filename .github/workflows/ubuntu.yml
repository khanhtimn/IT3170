name: Ubuntu CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++
    - name: Build
      run: |
        just build-all
        just build-test
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-build
        path: build/
        retention-days: 5

  test:
    name: Test on Ubuntu
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: ubuntu-build
        path: build
    - name: Run tests
      run: |
        chmod -R +x build/
        just test-all
 